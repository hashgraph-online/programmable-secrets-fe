apiVersion: apps/v1
kind: Deployment
metadata:
  name: programmable-secrets-postgres
  labels:
    app: programmable-secrets-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: programmable-secrets-postgres
  template:
    metadata:
      labels:
        app: programmable-secrets-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: ps
            - name: POSTGRES_PASSWORD
              value: ps
            - name: POSTGRES_DB
              value: ps
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'ps']
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ['pg_isready', '-U', 'ps']
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: programmable-secrets-pgdata
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: programmable-secrets-pgdata
  labels:
    app: programmable-secrets-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: programmable-secrets-postgres
  labels:
    app: programmable-secrets-postgres
spec:
  selector:
    app: programmable-secrets-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
