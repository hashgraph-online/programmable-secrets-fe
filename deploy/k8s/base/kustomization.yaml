apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: programmable-secrets
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - deployment.yaml
  - service.yaml
  - ciphertext-pvc.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: programmable-secrets-env
    envs:
      - programmable-secrets.env
    type: Opaque
